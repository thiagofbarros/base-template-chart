name: Release Helm Chart

on:
  push:
    tags:
      - 'v*.*.*'


permissions:
  contents: read
  id-token: write # for OIDC to AWS

jobs:
  release:
    name: Package and Push Helm Chart to ECR
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: vars
        run: |
          TAG_REF="${GITHUB_REF##*/}" # e.g. v1.2.3
          VERSION=${TAG_REF#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Configure AWS credentials (OIDC Role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        # Se preferir access keys, adicione aws-access-key-id e aws-secret-access-key como secrets e linhas aqui.

      - name: Enable Helm OCI
        run: |
          helm version
          echo "helm OCI enabled by default in v3"

      - name: Validate chart version matches tag
        run: |
          CHART_VERSION=$(grep '^version:' Chart.yaml | awk '{print $2}')
          if [ "$CHART_VERSION" != "${{ steps.vars.outputs.version }}" ]; then
            echo "Chart.yaml version ($CHART_VERSION) does not match tag version (${{ steps.vars.outputs.version }})" >&2
            exit 1
          fi

      - name: Login to ECR (OCI)
        run: |
          aws ecr get-login-password --region "$AWS_REGION" | helm registry login -u AWS --password-stdin "$ECR_REGISTRY"

      - name: Package chart
        run: |
          helm dependency update . || true
          helm package . --version "${{ steps.vars.outputs.version }}" --app-version "${{ steps.vars.outputs.version }}"

      - name: Push chart to ECR OCI registry
        run: |
          CHART_NAME=$(grep '^name:' Chart.yaml | awk '{print $2}')
          PACKAGE_FILE="${CHART_NAME}-${{ steps.vars.outputs.version }}.tgz"
          # Ensure repository path includes chart name if desired (ECR uses repositories like <account>.dkr.ecr.region.amazonaws.com/helm/<chart>)
          DESTINATION="oci://$ECR_REGISTRY"
          echo "Pushing $PACKAGE_FILE to $DESTINATION"
          helm push "$PACKAGE_FILE" "$DESTINATION"

      - name: Output artifact name
        run: |
          CHART_NAME=$(grep '^name:' Chart.yaml | awk '{print $2}')
          echo "Chart $CHART_NAME version ${{ steps.vars.outputs.version }} pushed to $ECR_REGISTRY"