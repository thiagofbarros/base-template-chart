# Basic application information
application:
  name: app-name
  environment: dev
  type: deployment

### Deployment Configuration
deployment:
  replicaCount: 1
  
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
    # targetMemoryUtilizationPercentage: 80
  
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%

### Image Configuration
image:
  repository: hello-world
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "latest"

imagePullSecrets: []

### Environment Variables
env: {}
  # - name: MY_ENV_VAR
  #   value: "my-value"
  # - name: ANOTHER_ENV_VAR
  #   valueFrom:
  #     secretKeyRef:
  #       name: my-secret
  #       key: secret-key

envFromConfigMaps: {}
  # - name: my-config-map

envFromSecrets: {}
  # - name: my-secret

externalSecrets:
  refreshInterval: 1h
  secretStore: vault-oke
  # secrets:
  #   - name: my-external-secret
  #     key: cluster/namespace/my-external-secret

configMaps: {}
  # my-config-map:
  #   data:
  #     my-key: my-value
  #   labels:
  #     app: my-app
  #   annotations:
  #     description: "This is my config map"

podAnnotations: {}
podLabels: {}

resources: {}
